<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <h2>Vue 内容渲染指令</h2>
      <!-- v-text 指令：将数据作为文本内容渲染到元素中,会覆盖元素原有的内容 -->
      <p v-text="message">内容：</p>
      <!-- v-html 指令：将数据作为 HTML 内容渲染到元素中,会覆盖元素原有的内容 -->
      <p v-html="htmlContent">HTML内容：</p>
    </div>
    <script src="../js/vue.js"></script>
    <script>
      new Vue({
        el: "#app",
        data: {
          message: "Hello, Vue!",
          name: "Vue.js",
          money: 1000,
          htmlContent: "<p>This is <strong>HTML</strong> content.</p>",
        },
      });
    </script>
  </body>
</html>
