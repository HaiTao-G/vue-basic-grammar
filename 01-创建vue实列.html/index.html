<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>

    <!-- 准备容器-->
    <div id="app">
      <h1>{{ message }}</h1>
    </div>

    <!-- 引入 Vue.js -->
    <script src="../js/vue.js"></script>
    <script>
        <!-- 创建 Vue 实例 -->
      new Vue({
        el: '#app',
        data: {
          message: 'Hello, Vue!'
        }
      })
    </script>
  </body>
</html>
