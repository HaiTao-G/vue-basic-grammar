<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 准备容器-->
    <div id="app">
      <!--
      插值表达式注意点：
      1.只能在标签内部使用 
      2.使用的数据要在 data 中定义 
      3.支持的是表达式，非语句 
      -->
      <h1>{{ message }}</h1>
      <h1>{{ message.toUpperCase() }}</h1>
      <h1>{{ name }}</h1>
      <div v-html="htmlContent"></div>
    </div>

    <!-- 引入 Vue.js -->
    <script src="../js/vue.js"></script>
    <script>
      <!-- 创建 Vue 实例 -->
      new Vue({
        el: "#app",
        data: {
          message: "Hello, Vue!",
          name: "Vue.js",
          htmlContent: "<p>This is <strong>HTML</strong> content.</p>",
        },
      });
    </script>
  </body>
</html>
